#####-----cboard参数-----#####
quaternion_canid: 0x100
bullet_speed_canid: 0x101
send_canid: 0xff
can_interface: "can0"

#####-----gimbal参数-----#####
com_port: "/dev/gimbal"
# com_port: "/dev/ttyACM0"
yaw_kp: 0
yaw_kd: 0
pitch_kp: 0
pitch_kd: 0

#####-----planner-----#####
fire_thresh: 0.0035

max_yaw_acc: 50
Q_yaw: [9e5, 0]
R_yaw: [1]
# max_yaw_acc: 50
# Q_yaw: [9e5, 0, 0, 9e4, 0, 0]
# R_yaw: [1, 1]

max_pitch_acc: 100
Q_pitch: [9e6, 0]
R_pitch: [1]

max_yaw_vel: 12.56
max_pitch_vel: 12.56 
max_yaw_jerk: 10.0
max_pitch_jerk: 10.0

shoot_offset: 2

